<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Verification Portal | IEEE IAS DIU SBC</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1e4611;
            --secondary-color: #2e661b;
            --bg-color: #f0f4f2;
            --text-dark: #222222;
            --text-muted: #666666;
            --success: #28a745;
            --danger: #dc3545;
            --card-bg: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #e2efe5 0%, transparent 40%), 
                              radial-gradient(circle at bottom left, #e2efe5 0%, transparent 40%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Card Container */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            animation: slideUp 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card Header */
        .card-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            padding: 30px 20px;
            text-align: center;
            color: #ffffff;
        }

        .card-header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .card-header p {
            margin: 5px 0 0 0;
            font-size: 13px;
            font-weight: 300;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Card Body */
        .card-body {
            padding: 35px 25px 25px 25px;
            text-align: center;
        }

        /* Icons */
        .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .icon-box.success { background-color: #eaf1ea; color: var(--success); }
        .icon-box.error { background-color: #fdeaea; color: var(--danger); }

        .icon-box svg { width: 35px; height: 35px; fill: currentColor; }

        /* Typography */
        h2.status-title {
            margin: 0 0 20px 0;
            font-size: 20px;
            font-weight: 600;
        }
        .status-title.success-text { color: var(--primary-color); }
        .status-title.error-text { color: var(--danger); }

        /* User Info Box */
        .info-box {
            background: #f8fbf8;
            border: 1px solid #dcedd9;
            border-radius: 10px;
            padding: 20px 15px;
            margin-bottom: 25px;
        }

        .info-box.error-box {
            background: #fff5f5;
            border-color: #ffe0e0;
        }

        .user-name {
            margin: 0 0 8px 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .user-role {
            margin: 0 0 15px 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        .badge {
            display: inline-block;
            background: var(--primary-color);
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(30, 70, 17, 0.2);
        }

        p.error-msg {
            margin: 0 0 10px 0;
            font-size: 15px;
            color: var(--text-dark);
            font-weight: 500;
        }

        p.error-hint {
            margin: 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Footer / Button */
        .card-footer {
            padding: 0 25px 30px 25px;
            text-align: center;
        }

        .btn-home {
            display: inline-block;
            width: 100%;
            padding: 12px 0;
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .btn-home:hover {
            background: var(--primary-color);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(30, 70, 17, 0.2);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <h1>IEEE IAS DIU SBC</h1>
            <p>Verification Portal</p>
        </div>
        
        <div class="card-body" id="content">
            <p style="color: #666;">Authenticating ID...</p>
        </div>

        <div class="card-footer">
            <a href="/" class="btn-home">Return to Homepage</a>
        </div>
    </div>

    <script>
        // মেম্বার এবং টিচারদের ডাটাবেস (Full Name ID সহ)
        const membersData = {

            "md-dara-abdus-satter": { name: "Md. Dara Abdus Satter", post: "Advisor", status: "Active Member" },
            "anjan-kumar-bagchi": { name: "Anjan Kumar Bagchi", post: "Mentor", status: "Active Member" },
            "sudipto-pramanik": { name: "Sudipto Pramanik", post: "Mentor", status: "Active Member" },

            "33-1767": { name: "K.M Rubaiyat Hasan", post: "Student Advisor", status: "Active Member" },
            "22205131130": { name: "Pallab Biswas", post: "Student Advisor", status: "Active Member" },
            "22205131050": { name: "Khalid Shifullah Mehedi", post: "Student Advisor", status: "Active Member" },
            "22205131115": { name: "Anik Chawdhury", post: "Student Advisor", status: "Active Member" },

            "2305131136": { name: "Mashiur Rahman Rana", post: "Vice Chair – Technical", status: "Active Member" },
            "2305131210": { name: "Arafat Islam", post: "General Secretary", status: "Active Member" },

            "2305131138": { name: "Mst.Munika Khatun", post: "Female Coordinator", status: "Active Member" },

        };

        // URL থেকে ID রিড করা
        const urlParams = new URLSearchParams(window.location.search);
        const memberId = urlParams.get('id');
        const contentDiv = document.getElementById('content');

        // SVG Icons
        const successIcon = `<svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>`;
        const errorIcon = `<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>`;

        if (memberId && membersData[memberId]) {
            const member = membersData[memberId];
            contentDiv.innerHTML = `
                <div class="icon-box success">${successIcon}</div>
                <h2 class="status-title success-text">Verified Authentic</h2>
                <div class="info-box">
                    <h3 class="user-name">${member.name}</h3>
                    <p class="user-role">${member.post}</p>
                    <div class="badge">✔️ ${member.status}</div>
                </div>
            `;
        } else {
            contentDiv.innerHTML = `
                <div class="icon-box error">${errorIcon}</div>
                <h2 class="status-title error-text">Verification Failed</h2>
                <div class="info-box error-box">
                    <p class="error-msg">No valid record found.</p>
                    <p class="error-hint">This ID card might be invalid, expired, or not registered in our current database.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
